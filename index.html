<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mon Blog Firebase</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="light">
    <!-- Bouton de thème en haut à droite -->
    <button
      class="theme-toggle"
      id="themeToggle"
      onclick="attemptThemeChange()"
    >
      🌙 Dark
    </button>

    <div class="container">
      <header>
        <div class="header-content">
          <h1>Music Blog</h1>
          <div class="auth-section">
            <span id="userInfo"></span>
            <button id="loginBtn" class="btn-primary">Se connecter</button>
            <button id="registerBtn" class="btn-secondary">S'inscrire</button>
            <button id="logoutBtn" class="btn-danger" style="display: none">
              Déconnexion
            </button>
          </div>
        </div>
      </header>

      <div id="adminPanel" class="admin-panel" style="display: none">
        <h3>🔧 Panel Admin</h3>
        <button id="newArticleBtn" class="btn-primary1">
          ✍️ Nouvel Article
        </button>
      </div>

      <div id="messageContainer"></div>

      <div id="articlesContainer" class="articles-container">
        <div class="loading">
          <div class="spinner"></div>
          Chargement des articles...
        </div>
      </div>
    </div>

    <!-- Modals existantes -->
    <div id="loginModal" class="modal">
      <div class="modal-content">
        <h2>Connexion</h2>
        <form id="loginForm">
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="loginEmail" required />
          </div>
          <div class="form-group">
            <label>Mot de passe</label>
            <input type="password" id="loginPassword" required />
          </div>
          <div class="form-group">
            <button type="submit" class="btn-primary">Se connecter</button>
            <button
              type="button"
              class="btn-secondary"
              onclick="closeModal('loginModal')"
            >
              Annuler
            </button>
          </div>
        </form>
      </div>
    </div>

    <div id="registerModal" class="modal">
      <div class="modal-content">
        <h2>Inscription</h2>
        <form id="registerForm">
          <div class="form-group">
            <label>Nom d'affichage</label>
            <input type="text" id="registerName" required />
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="registerEmail" required />
          </div>
          <div class="form-group">
            <label>Mot de passe</label>
            <input
              type="password"
              id="registerPassword"
              minlength="6"
              required
            />
          </div>
          <div class="form-group">
            <button type="submit" class="btn-primary">S'inscrire</button>
            <button
              type="button"
              class="btn-secondary"
              onclick="closeModal('registerModal')"
            >
              Annuler
            </button>
          </div>
        </form>
      </div>
    </div>

    <div id="articleModal" class="modal">
      <div class="modal-content">
        <h2 id="articleModalTitle">Nouvel Article</h2>
        <form id="articleForm">
          <div class="form-group">
            <label>Titre</label>
            <input type="text" id="articleTitle" required />
          </div>
          <div class="form-group">
            <label>Contenu</label>
            <textarea id="articleContent" required></textarea>
          </div>
          <div class="form-group">
            <label
              ><input type="checkbox" id="articlePublished" checked /> Publier
              immédiatement</label
            >
          </div>
          <div class="form-group">
            <button type="submit" class="btn-primary2">Enregistrer</button>
            <button
              type="button"
              class="btn-secondary2"
              onclick="closeModal('articleModal')"
            >
              Annuler
            </button>
          </div>
        </form>
      </div>
    </div>

    <!-- Scripts -->
    <script defer src="theme-gothic.js"></script>
    <script defer type="module" src="script.js"></script>
  </body>
</html>
